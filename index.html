<div id="controls">
  <label>Unit:
    <select id="unitFilter">
      <option value="">All units</option>
      <option value="1">Unit 1</option>
      <option value="2">Unit 2</option>
      <option value="3">Unit 3</option>
      <option value="4">Unit 4</option>
      <option value="5">Unit 5</option>
      <option value="6">Unit 6</option>
      <option value="7">Unit 7</option>
      <option value="8">Unit 8</option>
      <option value="9">Unit 9</option>
      <option value="10">Unit 10</option>
      <option value="11">Unit 11</option>
      <option value="12">Unit 12</option>
      <option value="13">Unit 13</option>
      <option value="14">Unit 14</option>
      <option value="15">Unit 15</option>
      <option value="16">Unit 16</option>
      <option value="17">Unit 17</option>
      <option value="18">Unit 18</option>
      <option value="19">Unit 19</option>
      <option value="20">Unit 20</option>
    </select>
  </label>
  <button id="shuffle" type="button">Shuffle</button>
  <button id="skip" type="button">Skip</button>
  <button id="next" type="button">Reveal next</button>
</div>
<div id="progress" class="small"></div>
<table id="partsTable" style="width:100%; border-collapse:collapse;">
  <tr id="labels"></tr>
  <tr id="values"></tr>
</table>
<div class="small">
  Click “Reveal next” to show each principal part in order, ending with the verb’s meaning. Click again after the meaning to advance to the next verb.
</div>

<script>
const verbs=[
{u:1,p:"εἰμί",f:"ἔσομαι",a:"—",pa:"—",pm:"—",ap:"—",m:"be"},
{u:1,p:"ἔχω",f:"ἕξω / σχήσω",a:"ἔσχον",pa:"ἔσχηκα",pm:"—",ap:"—",m:"have, hold"},
{u:2,p:"φημί",f:"φήσω",a:"ἔφην",pa:"—",pm:"—",ap:"—",m:"say, assert"},
{u:2,p:"οἶδα",f:"εἴσομαι",a:"—",pa:"—",pm:"—",ap:"—",m:"know"},
{u:3,p:"γίγνομαι",f:"γενήσομαι",a:"ἐγενόμην",pa:"γέγονα",pm:"—",ap:"—",m:"become, happen"},
{u:3,p:"ἔρχομαι",f:"εἶμι",a:"ἦλθον",pa:"ἐλήλυθα",pm:"—",ap:"—",m:"come, go"},
{u:4,p:"λαμβάνω",f:"λήψομαι",a:"ἔλαβον",pa:"εἴληφα",pm:"εἴλημμαι",ap:"ἐλήμφθην",m:"take, receive"},
{u:4,p:"βάλλω",f:"βαλῶ",a:"ἔβαλον",pa:"βέβληκα",pm:"βέβλημαι",ap:"ἐβλήθην",m:"throw"},
{u:5,p:"λέγω",f:"ἐρῶ",a:"εἶπον",pa:"εἴρηκα",pm:"εἴρημαι",ap:"ἐρρήθην",m:"say, speak"},
{u:5,p:"ἀκούω",f:"ἀκούσομαι",a:"ἤκουσα",pa:"ἀκήκοα",pm:"—",ap:"ἠκούσθην",m:"hear"},
{u:6,p:"ὁράω",f:"ὄψομαι",a:"εἶδον",pa:"ἑόρακα / ἑώρακα",pm:"ἑώραμαι",ap:"ὤφθην",m:"see"},
{u:6,p:"εὑρίσκω",f:"εὑρήσω",a:"ηὗρον",pa:"ηὕρηκα",pm:"ηὕρημαι",ap:"εὑρέθην",m:"find"},
{u:7,p:"ἵστημι",f:"στήσω",a:"ἔστησα / ἔστην",pa:"ἕστηκα",pm:"ἕσταμαι",ap:"ἐστάθην",m:"set, stand"},
{u:7,p:"δίδωμι",f:"δώσω",a:"ἔδωκα",pa:"δέδωκα",pm:"δέδομαι",ap:"ἐδόθην",m:"give"},
{u:8,p:"τίθημι",f:"θήσω",a:"ἔθηκα",pa:"τέθηκα",pm:"τέθειμαι",ap:"ἐτέθην",m:"put, place"},
{u:8,p:"ἵημι",f:"ἥσω",a:"ἧκα",pa:"εἷκα",pm:"εἷμαι",ap:"εἵθην",m:"send, let go"},
{u:9,p:"γινώσκω",f:"γνώσομαι",a:"ἔγνων",pa:"ἔγνωκα",pm:"ἔγνωσμαι",ap:"ἐγνώσθην",m:"know, recognize"},
{u:9,p:"λανθάνω",f:"λήσω",a:"ἔλαθον",pa:"λέληθα",pm:"—",ap:"—",m:"escape notice, forget"},
{u:10,p:"μανθάνω",f:"μαθήσομαι",a:"ἔμαθον",pa:"μεμάθηκα",pm:"—",ap:"—",m:"learn"},
{u:10,p:"πάσχω",f:"πείσομαι",a:"ἔπαθον",pa:"πέπονθα",pm:"—",ap:"—",m:"suffer, experience"},
{u:11,p:"πίπτω",f:"πεσοῦμαι",a:"ἔπεσον",pa:"πέπτωκα",pm:"—",ap:"—",m:"fall"},
{u:11,p:"τρέπω",f:"τρέψω",a:"ἔτραπον",pa:"τέτροφα",pm:"τέτραμμαι",ap:"ἐτράπην",m:"turn"},
{u:12,p:"τρέχω",f:"δραμοῦμαι",a:"ἔδραμον",pa:"δεδράμηκα",pm:"—",ap:"—",m:"run"},
{u:12,p:"φεύγω",f:"φεύξομαι",a:"ἔφυγον",pa:"πέφευγα",pm:"—",ap:"—",m:"flee"},
{u:13,p:"ἄγω",f:"ἄξω",a:"ἤγαγον",pa:"ἦχα",pm:"ἦγμαι",ap:"ἤχθην",m:"lead, bring"},
{u:13,p:"φέρω",f:"οἴσω",a:"ἤνεγκον / ἤνεγκα",pa:"ἐνήνοχα",pm:"ἐνήνεγμαι",ap:"ἠνέχθην",m:"carry, bring"},
{u:14,p:"πίνω",f:"πίομαι",a:"ἔπιον",pa:"πέπωκα",pm:"—",ap:"—",m:"drink"},
{u:14,p:"ἐσθίω",f:"ἔδομαι",a:"ἔφαγον",pa:"ἐδήδοκα",pm:"—",ap:"—",m:"eat"},
{u:15,p:"αἱρέω",f:"αἱρήσω",a:"εἷλον",pa:"ᾕρηκα",pm:"ᾕρημαι",ap:"ᾑρέθην",m:"take, choose"},
{u:15,p:"ἀποθνῄσκω",f:"ἀποθανοῦμαι",a:"ἀπέθανον",pa:"τέθνηκα",pm:"—",ap:"—",m:"die"},
{u:16,p:"βλάπτω",f:"βλάψω",a:"ἔβλαψα",pa:"βέβλαφα",pm:"βέβλαμμαι",ap:"ἐβλάβην",m:"harm"},
{u:16,p:"κλέπτω",f:"κλέψω",a:"ἔκλεψα",pa:"κέκλοφα",pm:"κέκλεμμαι",ap:"ἐκλάπην",m:"steal"},
{u:17,p:"λείπω",f:"λείψω",a:"ἔλιπον",pa:"λέλοιπα",pm:"λέλειμμαι",ap:"ἐλείφθην",m:"leave"},
{u:17,p:"πείθω",f:"πείσω",a:"ἔπεισα",pa:"πέπεικα",pm:"πέπεισμαι",ap:"ἐπείσθην",m:"persuade"},
{u:18,p:"τέμνω",f:"τεμῶ",a:"ἔτεμον",pa:"τέτμηκα",pm:"τέτμημαι",ap:"ἐτμήθην",m:"cut"},
{u:18,p:"ἅπτω",f:"ἅψω",a:"ἧψα",pa:"ἧφα",pm:"ἧμμαι",ap:"ἥφθην",m:"fasten, touch"},
{u:19,p:"σπείρω",f:"σπερῶ",a:"ἔσπειρα",pa:"ἔσπαρκα",pm:"ἔσπαρμαι",ap:"ἐσπάρην",m:"sow"},
{u:19,p:"στέλλω",f:"στελῶ",a:"ἔστειλα",pa:"ἔσταλκα",pm:"ἔσταλμαι",ap:"ἐστάλην",m:"send, equip"},
{u:20,p:"μένω",f:"μενῶ",a:"ἔμεινα",pa:"μεμένηκα",pm:"—",ap:"—",m:"remain"},
{u:20,p:"καλέω",f:"καλέσω",a:"ἐκάλεσα",pa:"κέκληκα",pm:"κέκλημαι",ap:"ἐκλήθην",m:"call"}
];

const labelsAll = ["Present","Future","Aorist","Perfect active","Perfect mid/pass.","Aorist passive","Meaning"];
const keysAll   = ["p","f","a","pa","pm","ap","m"];

let currentList=[];
let idx=0;
let stage=1;

const labelsRow=document.getElementById("labels");
const valuesRow=document.getElementById("values");
const progressEl=document.getElementById("progress");

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function renderTableSkeleton(){
  labelsRow.innerHTML="";
  valuesRow.innerHTML="";
  labelsAll.forEach(lbl=>{
    const th=document.createElement("th");
    th.textContent=lbl;
    labelsRow.appendChild(th);
    const td=document.createElement("td");
    td.textContent="";
    valuesRow.appendChild(td);
  });
}

function buildList(){
  const unit=document.getElementById("unitFilter").value;
  currentList=verbs.filter(v=>!unit||String(v.u)===unit);
  shuffle(currentList);
  idx=0; stage=1;
  renderTableSkeleton();
  renderVerb();
}

function renderVerb(){
  if(currentList.length===0){
    progressEl.textContent="";
    renderTableSkeleton();
    valuesRow.firstChild.textContent="No verbs for that unit.";
    return;
  }
  const v=currentList[idx];
  progressEl.textContent=`Verb ${idx+1} of ${currentList.length} (Unit ${v.u})`;
  Array.from(valuesRow.children).forEach(td=>td.textContent="");
  valuesRow.children[0].textContent=v.p;
}

function revealNext(){
  if(currentList.length===0) return;
  const v=currentList[idx];

  if(stage<=keysAll.length-1){
    const key=keysAll[stage];
    valuesRow.children[stage].textContent = key==="m" ? v.m : v[key];
    stage++;

    if(stage>keysAll.length-1){
      stage = keysAll.length + 1;
    }
    return;
  }

  idx = (idx + 1) % currentList.length;
  stage = 1;
  renderVerb();
}

document.getElementById("next").onclick=revealNext;
document.getElementById("skip").onclick=() => { idx=(idx+1)%currentList.length; stage=1; renderVerb(); };
document.getElementById("shuffle").onclick=buildList;
document.getElementById("unitFilter").onchange=buildList;

buildList();
</script>
